name: Release

# Build Windows binaries and attach them to the GitHub Release for a v* tag.
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & publish binaries
    runs-on: windows-latest
    strategy:
      # Always ship the x64 artifact even if the (niche) arm64 build fails.
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc, aarch64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: pwsh
        run: |
          $name = "pix-mcp-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/pix-mcp.exe" "dist/pix-mcp.exe"
          Copy-Item README.md, LICENSE, SETUP.md "dist/"
          Compress-Archive -Path dist/* -DestinationPath "$name.zip" -Force

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: pix-mcp-*.zip
          generate_release_notes: true
