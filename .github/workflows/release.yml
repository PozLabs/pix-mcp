name: Release

# Build Windows binaries and attach them to the GitHub Release for a v* tag.
# The tag must exactly match the package version, for example v0.1.1.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TOOLCHAIN: "1.97.1"

jobs:
  verify:
    name: Verify tag and test
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.RELEASE_TOOLCHAIN }}
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-verify

      - name: Verify tag matches Cargo package version
        shell: pwsh
        run: |
          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          $expectedTag = "v$($metadata.packages[0].version)"
          if ($env:GITHUB_REF_NAME -cne $expectedTag) {
            throw "Release tag '$env:GITHUB_REF_NAME' does not match Cargo package version '$expectedTag'."
          }

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --all-targets --all-features

      - name: Verify minimum supported Rust version
        shell: pwsh
        run: |
          rustup toolchain install 1.88.0 --profile minimal --no-self-update
          cargo +1.88.0 test --locked --all-targets --all-features

  audit:
    name: RustSec audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Audit dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.target }}
    needs: [verify, audit]
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc, aarch64-pc-windows-msvc]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.RELEASE_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --all-features --target ${{ matrix.target }}

      - name: Package and checksum
        shell: pwsh
        run: |
          $name = "pix-mcp-${{ github.ref_name }}-${{ matrix.target }}"
          $staging = Join-Path $env:RUNNER_TEMP $name
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/pix-mcp.exe" $staging
          Copy-Item README.md, LICENSE, SETUP.md, pixtool-reference.md $staging
          Compress-Archive -Path "$staging/*" -DestinationPath "$name.zip" -Force
          $hash = (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $name.zip" | Set-Content "$name.zip.sha256" -Encoding ascii

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            pix-mcp-*.zip
            pix-mcp-*.zip.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Verify checksums
        working-directory: dist
        run: sha256sum --check *.sha256

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/pix-mcp-*.zip
            dist/pix-mcp-*.zip.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
